server:
  port: 8899

spring:
  profiles:
    active: local
  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

app:
  data-dir: ./data

  llm:
    api-url: ${LLM_API_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    max-tokens: 16384
    temperature: 0.9
